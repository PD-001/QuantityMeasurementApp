
app.name=QuantityMeasurementApplication
app.version=1.0

app.repository.type=database

db.url=jdbc:h2:file:./data/quantitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.driver=org.h2.Driver
db.username=sa
db.password=

db.pool.initialSize=5
db.pool.maxSize=20
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000

logging.level=INFO
logging.file=logs/quantity-measurement.log